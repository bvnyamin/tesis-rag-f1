services:
  app:
    build:
      context: .
    container_name: thesis-rag-f1-app
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_SQL_MODEL: ${OPENAI_SQL_MODEL:-gpt-5-mini}
      OPENAI_FINAL_RESPONSE_MODEL: ${OPENAI_FINAL_RESPONSE_MODEL:-gpt-5-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_EMBEDDING_BATCH_SIZE: ${OPENAI_EMBEDDING_BATCH_SIZE:-100}
      OPENAI_EMBEDDING_DIMENSIONS: ${OPENAI_EMBEDDING_DIMENSIONS:-}
      CHROMA_HOST: ${CHROMA_HOST:-chroma}
      CHROMA_PORT: ${CHROMA_PORT:-8000}
      CHROMA_COLLECTION: ${CHROMA_COLLECTION:-f1_structured_rag}
      CHROMA_SSL: ${CHROMA_SSL:-false}
      RETRIEVAL_TOP_K: ${RETRIEVAL_TOP_K:-5}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-f1_rag}
      POSTGRES_USER: ${POSTGRES_USER:-f1_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-f1_password}
      STREAMLIT_SERVER_PORT: ${STREAMLIT_SERVER_PORT:-8501}
    ports:
      - "${STREAMLIT_SERVER_PORT:-8501}:8501"
    volumes:
      - .:/workspace
    depends_on:
      chroma:
        condition: service_started
      postgres:
        condition: service_healthy
    command: >
      streamlit run app/streamlit_app.py
      --server.address=0.0.0.0
      --server.port=8501

  chroma:
    image: chromadb/chroma:0.5.5
    container_name: thesis-rag-f1-chroma
    ports:
      - "${CHROMA_PORT:-8000}:8000"
    volumes:
      - ./storage/chroma:/chroma/chroma

  postgres:
    image: postgres:17-alpine
    container_name: thesis-rag-f1-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-f1_rag}
      POSTGRES_USER: ${POSTGRES_USER:-f1_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-f1_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./storage/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-f1_user} -d ${POSTGRES_DB:-f1_rag}"]
      interval: 10s
      timeout: 5s
      retries: 5
